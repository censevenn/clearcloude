<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>clearcloud | Ваши медиа без лишнего</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@300;400;600&display=swap');
        body { font-family: 'Crimson Pro', serif; letter-spacing: -0.01em; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #111; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        .glow-on-hover:hover { box-shadow: 0 0 15px rgba(255, 255, 255, 0.15); transform: translateY(-1px); }
    </style>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bg-dark': '#111111',
                        'btn-dark': '#1a1a1a',
                        'border-gray': '#333333',
                        'text-muted': '#a1a1a1',
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-bg-dark text-white min-h-screen flex flex-col items-center p-6 md:p-12">

    <header class="w-full max-w-7xl flex items-center justify-center mb-16 md:mb-24">
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M3 15a4 4 0 004 4h9a5 5 0 10-.1-9.999 5.002 5.002 0 10-9.78 2.096A4.001 4.001 0 003 15z"></path></svg>
            <span class="text-3xl font-semibold tracking-tight">clearcloud</span>
        </div>
    </header>

    <main class="w-full max-w-3xl text-center flex-grow flex flex-col items-center justify-center">
        <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full border border-border-gray bg-btn-dark/50 text-sm text-text-muted mb-10">
            <span class="w-2 h-2 rounded-full bg-green-400"></span> Бесплатно • Анонимно • Приватно
        </div>

        <h1 class="text-5xl md:text-6xl font-medium leading-tight tracking-tighter mb-8">Ваши медиа <br> без лишнего</h1>
        <p class="text-xl text-text-muted leading-relaxed mb-16 font-light">Освободите память телефона. Храните фото и видео <br class="hidden md:block"> в личном облаке — без подписки и без слежки.</p>

        <div class="w-full max-w-md space-y-5">
            <button class="w-full py-4 px-6 rounded-xl bg-white text-black text-lg font-semibold glow-on-hover transition-all">Загрузить медиа</button>
            <div class="relative flex py-3 items-center"><div class="flex-grow border-t border-border-gray/70"></div><span class="mx-4 text-sm text-border-gray">или</span><div class="flex-grow border-t border-border-gray/70"></div></div>
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <button class="google-btn w-full py-3.5 px-6 rounded-xl border border-border-gray bg-btn-dark/50 hover:bg-btn-dark transition-all glow-on-hover">Подключить Google</button>
                <button class="w-full py-3.5 px-6 rounded-xl border border-border-gray bg-btn-dark/50 hover:bg-btn-dark transition-all glow-on-hover">С компьютера</button>
            </div>
        </div>
    </main>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB7xpDntHKOobPAnsLkx5VMyCCzQbVMGnM",
        authDomain: "clearcloude.firebaseapp.com",
        projectId: "clearcloude",
        storageBucket: "clearcloude.appspot.com",
        messagingSenderId: "441353799530",
        appId: "1:441353799530:web:bc87678c983966c473c713"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Привязка к кнопке
  document.querySelector('.google-btn').addEventListener('click', () => {
    signInWithPopup(auth, provider)
      .then((result) => {
        const user = result.user;
        console.log("Успешный вход:", user.displayName);
        alert("Привет, " + user.displayName + "!");
      })
      .catch((error) => {
        console.error("Ошибка входа:", error);
      });
  });
    // Ждем загрузки всех элементов DOM
    window.addEventListener('DOMContentLoaded', () => {
        const googleBtn = document.querySelector('.google-btn');
        if (googleBtn) {
            googleBtn.addEventListener('click', () => {
                signInWithPopup(auth, provider)
                    .then((result) => alert("Успешно: " + result.user.displayName))
                    .catch((err) => console.error("Ошибка Firebase:", err));
            });
        } else {
            console.error("Кнопка .google-btn не найдена на странице");
        }
    });
</script>
    <input type="file" id="fileInput" class="hidden" accept="image/*,video/*">

<button id="uploadBtn" class="w-full py-4 px-6 rounded-xl bg-white text-black text-lg font-semibold glow-on-hover transition-all">
    Загрузить медиа
</button>
